<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laura AI Companion</title>

<style>
    body {
        margin: 0;
        background: #000;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    #avatarContainer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        z-index: 1;
    }

    #avatarVideo {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #chatContainer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: rgba(0,0,0,0.6);
        padding: 15px;
        display: flex;
        gap: 10px;
        z-index: 2;
    }

    #userInput {
        flex: 1;
        padding: 12px;
        border-radius: 6px;
        border: none;
        font-size: 16px;
    }

    #sendBtn {
        padding: 12px 20px;
        background: #ff4da6;
        border: none;
        border-radius: 6px;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }
</style>
</head>

<body>

<div id="avatarContainer">
    <video id="avatarVideo" autoplay loop muted playsinline>
        <source src="public/Laura video Avatar.mp4" type="video/mp4">
    </video>
</div>

<div id="chatContainer">
    <input id="userInput" placeholder="Talk to Laura..." />
    <button id="sendBtn">Send</button>
</div>

<script>
const apiKey = "Bearer YOUR_GROQ_KEY_HERE";  // ← Replace with your real key

async function talkToLaura(message) {
    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": apiKey
            },
            body: JSON.stringify({
                model: "llama3-8b-8192",
                messages: [
                    { role: "system", content: "You are Laura, a warm, affectionate AI companion." },
                    { role: "user", content: message }
                ]
            })
        });

        const data = await response.json();
        return data.choices?.[0]?.message?.content || "I'm having trouble thinking right now.";
    } catch (err) {
        return "Something went wrong.";
    }
}

document.getElementById("sendBtn").onclick = async () => {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    const reply = await talkToLaura(text);
    alert("Laura: " + reply);  // TEMP — replace with chat bubbles later

    input.value = "";
};
</script>

</body>
</html>
