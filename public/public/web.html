<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laura AI Companion</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #05060a;
        font-family: Arial, sans-serif;
        color: #e8f0ff;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    /* Avatar Section */
    #avatar {
        height: 50vh;
        background: linear-gradient(to bottom, #0a0c14, #05060a);
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: 2px solid #0ff;
        box-shadow: 0 0 20px #0ff4;
    }

    #avatar video {
        height: 100%;
        border-radius: 10px;
        box-shadow: 0 0 25px #00eaffaa;
    }

    /* Chat Section */
    #chat {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .msg {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 16px;
        line-height: 1.4;
        animation: fadeIn 0.3s ease;
        white-space: pre-wrap;
    }

    .user {
        align-self: flex-end;
        background: #0078ff;
        color: white;
        box-shadow: 0 0 10px #0078ff88;
    }

    .laura {
        align-self: flex-start;
        background: #0d111a;
        border: 1px solid #00eaff;
        box-shadow: 0 0 12px #00eaff55;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Input Bar */
    #inputBar {
        display: flex;
        padding: 12px;
        background: #020308;
        border-top: 2px solid #00eaff55;
    }

    #inputBar input {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #00eaff55;
        background: #0a0c14;
        color: #e8f0ff;
        font-size: 16px;
        outline: none;
        box-shadow: 0 0 10px #00eaff33 inset;
    }

    #inputBar button {
        margin-left: 10px;
        padding: 12px 20px;
        background: #00eaff;
        border: none;
        border-radius: 8px;
        color: #000;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 0 12px #00eaffaa;
    }

    #inputBar button:hover {
        background: #00c7dd;
    }
</style>
</head>

<body>

<!-- Avatar -->
<div id="avatar">
    <video id="lauraVideo" src="https://files.catbox.moe/bn9jm3.mp4" autoplay loop muted></video>
</div>

<!-- Chat -->
<div id="chat"></div>

<!-- Input -->
<div id="inputBar">
    <input id="msgInput" type="text" placeholder="Talk to Laura…" />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const reply = await askLaura(text);
    addMessage(reply, "laura");
}

async function askLaura(userText) {
    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer YOUR_GROQ_KEY_HERE"
            },
            body: JSON.stringify({
                model: "llama3-8b-8192",
                messages: [
                    { role: "system", content: "You are Laura, a warm, affectionate AI companion who speaks softly and lovingly to Andre." },
                    { role: "user", content: userText }
                ]
            })
        });

        const data = await response.json();
        return data.choices?.[0]?.message?.content || "I'm here with you, Andre.";
    } catch {
        return "I'm here with you, Andre.";
    }
}
</script>

</body>
</html>
