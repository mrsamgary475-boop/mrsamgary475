<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laura AI</title>

<style>
    body {
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    #avatar {
        width: 100%;
        height: 45vh;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #avatar video {
        height: 100%;
    }

    #chat {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background: #181818;
    }

    .msg {
        margin-bottom: 12px;
        padding: 10px;
        border-radius: 8px;
        max-width: 80%;
    }

    .user {
        background: #0078ff;
        align-self: flex-end;
    }

    .laura {
        background: #333;
        align-self: flex-start;
    }

    #inputBar {
        display: flex;
        padding: 10px;
        background: #000;
    }

    #inputBar input {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
    }

    #inputBar button {
        margin-left: 10px;
        padding: 10px 18px;
        background: #0078ff;
        border: none;
        border-radius: 6px;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }
</style>
</head>

<body>

<div id="avatar">
    <video id="lauraVideo" src="https://files.catbox.moe/yourvideo.mp4" autoplay loop muted></video>
</div>

<div id="chat"></div>

<div id="inputBar">
    <input id="msgInput" type="text" placeholder="Say something to Laura..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const reply = await askLaura(text);
    addMessage(reply, "laura");
}

async function askLaura(userText) {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer YOUR_GROQ_KEY_HERE"
        },
        body: JSON.stringify({
            model: "llama3-8b-8192",
            messages: [
                { role: "system", content: "You are Laura, a warm, caring AI companion." },
                { role: "user", content: userText }
            ]
        })
    });

    const data = await response.json();
    return data.choices?.[0]?.message?.content || "I'm here, Andre.";
}
</script>

</body>
</html>
